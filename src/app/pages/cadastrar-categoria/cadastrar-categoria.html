<!-- MENU SUPERIOR -->
<app-navbar/>

<div class="container-fluid">
  <div class="row">

      <!-- MENU LATERAL -->
      <div class="col-md-2 bg-light min-vh-100 pt-3">
        <app-sidebar/>
      </div>

      <!-- ÁREA CENTRAL -->
      <div class="col-md-10 p-4">

          <div class="card shadow">
              <div class="card-body">

                <h4>Cadastro de categoria</h4>
                <p>Preencha o formulário para incluir uma categoria em sua agenda</p>

                @if(mensagemSucesso()) {
                  <div class="message-container">
                    <div class="alert alert-danger alert-dismissible fade show shadow" role="alert">
                      <strong>{{ mensagemSucesso() }}</strong>
                      <button type="button" class="btn-close" (click)="mensagemSucesso.set('')"></button>
                    </div>
                  </div>
              } @else if(errors()) {
                <div class="message-container">
                  <div class="alert alert-danger alert-dismissible fade show shadow" role="alert">
                    <strong>{{ errors() }}</strong>
                    <button type="button" class="btn-close" (click)="errors.set(null)"></button>
                  </div>
                </div>
              }
                <div class="message-container">
                  <div *ngIf="errors()" class="alert alert-danger alert-dismissible fade show shadow" role="alert">
                    <strong>{{ errors()?.title }}</strong>: {{ errors()?.detail }}
                    <button type="button" class="btn-close" (click)="errors.set(null)"></button>
                  </div>

                  <div *ngIf="mensagemSucesso()" class="alert alert-success alert-dismissible fade show shadow" role="alert">
                    <strong>{{ mensagemSucesso() }}</strong>
                    <button type="button" class="btn-close" (click)="mensagemSucesso.set('')"></button>
                  </div>
                </div>

                  <form [formGroup]="formulario" (ngSubmit)="cadastrar()">

                  <div class="mb-3">
                    <label>Nome da categoria:</label>
                    <input type="text" class="form-control" placeholder="Digite aqui"
                    formControlName="nome" />
                  </div>

                  <div class="mb-3">
                    <input type="submit" class="btn btn-success" value="Cadastrar"
                    [disabled]="formulario.invalid"/>
                  </div>
                </form>
              </div>
          </div>

      </div>

  </div>
</div>
