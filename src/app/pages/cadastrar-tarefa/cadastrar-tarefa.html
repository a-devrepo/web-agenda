<!-- MENU SUPERIOR -->
<app-navbar/>

<div class="container-fluid">
    <div class="row">
        <!-- MENU LATERAL -->
        <div class="col-md-2 bg-light min-vh-100 pt-3">
            <app-sidebar/>
        </div>

        <!-- ÁREA CENTRAL -->
        <div class="col-md-10 p-4">

            <div class="card shadow">
                <div class="card-body">

                    <h4>Cadastro de tarefa</h4>
                    <p>Preencha o formulário para incluir uma tarefa em sua agenda.</p>

                    @if(mensagemSucesso()) {
                      <div class="message-container">
                        <div class="alert alert-success alert-dismissible fade show shadow" role="alert">
                          <strong>{{ mensagemSucesso() }}</strong>
                          <button type="button" class="btn-close" (click)="mensagemSucesso.set('')"></button>
                        </div>
                      </div>
                  } @else if(errors()) {
                    <div class="message-container">
                      <div class="alert alert-danger alert-dismissible fade show shadow" role="alert">
                        <strong>{{ errors() }}</strong>
                        <button type="button" class="btn-close" (click)="errors.set(null)"></button>
                      </div>
                    </div>
                  }

                    <form [formGroup]="formulario" (ngSubmit)="cadastrar()">

                        <div class="mb-3">
                            <label>Nome da tarefa:</label>
                            <input type="text" class="form-control" placeholder="Digite aqui"
                                formControlName="nome"/>
                        </div>

                        <div class="mb-3">
                            <label>Data da tarefa:</label>
                            <input type="date" class="form-control" formControlName="data"/>
                        </div>

                        <div class="mb-3">
                            <label>Hora da tarefa:</label>
                            <input type="time" class="form-control" formControlName="hora"/>
                        </div>

                        <div class="mb-3">
                            <label>Prioridade:</label>
                            <select class="form-select" formControlName="prioridade">
                                <option value="">Escolha uma opção</option>
                                <option value="ALTA">Prioridade alta</option>
                                <option value="MEDIA">Prioridade média</option>
                                <option value="BAIXA">Prioridade baixa</option>
                            </select>
                        </div>

                        <div class="mb-3">
                          <label>Categoria:</label>
                          <select class="form-select" formControlName="categoriaId" >
                              <option value="">Escolha uma opção</option>

                              @if(categorias()){
                                @for (c of categorias(); track c.id) {
                                  <option value="{{c.id}}">{{c.nome | uppercase}}</option>
                                }
                              }
                          </select>
                      </div>

                      <div class="mb-3">
                          <input type="submit" class="btn btn-success" value="Cadastrar tarefa"
                              [disabled]="formulario.invalid"/>
                      </div>

                    </form>

                </div>
            </div>
        </div>
</div>
